<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — ลงทะเบียนตู้ใหม่</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f5f6f8;--sur:#fff;--sur2:#f0f2f5;--bd:rgba(0,0,0,0.08);--bd2:rgba(0,0,0,0.15);--tx:#1a1a1a;--mu:#6b7280;--gr:#16a34a;--gr-bg:#f0fdf4;--rd:#dc2626;--rs:10px}
    body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:24px 16px}
    .page{max-width:680px;margin:0 auto}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--bd)}
    .logo{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
    .badge-admin{font-size:12px;background:rgba(220,38,38,0.1);color:var(--rd);border:1px solid rgba(220,38,38,0.3);border-radius:99px;padding:2px 10px;font-weight:500}
    .btn-sm{font-family:'Kanit',sans-serif;font-size:14px;padding:7px 16px;border-radius:99px;cursor:pointer;border:1px solid var(--bd2);background:var(--sur2);color:var(--mu)}
    .btn-sm:hover{background:var(--sur);color:var(--tx)}
    .section{background:var(--sur);border:1px solid var(--bd);border-radius:16px;padding:22px 24px;margin-bottom:16px}
    .sec-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--mu);margin-bottom:16px;display:flex;align-items:center;gap:6px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .ig{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
    .ig:last-child{margin-bottom:0}
    .label{font-size:12px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:0.05em}
    .field{width:100%;background:var(--sur2);border:1px solid var(--bd2);border-radius:var(--rs);padding:10px 12px;font-family:'Kanit',sans-serif;font-size:15px;color:var(--tx);outline:none;transition:border-color 0.15s}
    .field:focus{border-color:rgba(22,163,74,0.5);background:#fff}
    .hint{font-size:12px;color:var(--mu);margin-top:3px}
    .pw-wrap{position:relative}
    .pw-wrap .field{padding-right:40px}
    .pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:var(--mu);padding:4px}
    .btn-reg{width:100%;font-family:'Kanit',sans-serif;font-size:17px;font-weight:500;padding:14px;border-radius:99px;cursor:pointer;background:var(--gr);color:#fff;border:none;margin-top:4px;transition:opacity 0.2s}
    .btn-reg:hover:not(:disabled){opacity:0.88}
    .btn-reg:disabled{opacity:0.4;cursor:not-allowed}
    .msg{text-align:center;font-size:14px;margin-top:12px;padding:10px 16px;border-radius:10px;display:none}
    .msg.ok{background:var(--gr-bg);color:var(--gr);border:1px solid rgba(22,163,74,0.3)}
    .msg.err{background:rgba(220,38,38,0.06);color:var(--rd);border:1px solid rgba(220,38,38,0.3)}
    .list-section{background:var(--sur);border:1px solid var(--bd);border-radius:16px;padding:22px 24px}
    .dev-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);gap:10px}
    .dev-row:last-child{border-bottom:none}
    .dev-info{flex:1;min-width:0}
    .dev-name-row{font-size:15px;font-weight:500}
    .dev-meta{font-size:12px;color:var(--mu);margin-top:2px}
    .status-pill{font-size:12px;padding:3px 10px;border-radius:99px;white-space:nowrap}
    .status-pill.unclaimed{background:var(--sur2);color:var(--mu);border:1px solid var(--bd2)}
    .status-pill.claimed{background:var(--gr-bg);color:var(--gr);border:1px solid rgba(22,163,74,0.3)}
    .btn-del{background:none;border:none;color:var(--mu);cursor:pointer;font-size:18px;padding:4px 8px;border-radius:6px}
    .btn-del:hover{color:var(--rd)}
    .empty-list{text-align:center;padding:32px;color:var(--mu);font-size:14px}
    @media(max-width:480px){.row2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="auth-guard" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="width:36px;height:36px;border:3px solid var(--bd2);border-top-color:var(--rd);border-radius:50%;animation:spin 0.7s linear infinite"></div>
  <p style="font-size:15px;color:var(--mu)">กำลังตรวจสอบสิทธิ์…</p>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div class="page">
  <header>
    <a href="admin.html" class="btn-sm" style="text-decoration:none">← Admin Panel</a>
    <div class="logo">📦 <span class="badge-admin">จัดการตู้</span></div>
    <div style="flex:1"></div>
  </header>

  <!-- Form ลงทะเบียนตู้ใหม่ -->
  <div class="section">
    <div class="sec-title">📦 ลงทะเบียนตู้ใหม่เข้าระบบ</div>

    <div class="row2">
      <div class="ig">
        <div class="label">Device ID *</div>
        <input class="field" id="a-id" placeholder="incubator_02">
        <div class="hint">ไม่ซ้ำกัน — ใช้ขีดล่างแทนช่องว่าง</div>
      </div>
      <div class="ig">
        <div class="label">ชื่อตู้ *</div>
        <input class="field" id="a-name" placeholder="ตู้ที่ 2 — เป็ด">
      </div>
    </div>

    <div class="sec-title" style="margin-top:8px;">📶 WiFi</div>
    <div class="row2">
      <div class="ig">
        <div class="label">SSID</div>
        <input class="field" id="a-ssid" placeholder="ชื่อ WiFi">
      </div>
      <div class="ig">
        <div class="label">Password</div>
        <div class="pw-wrap">
          <input class="field" type="password" id="a-wpass" placeholder="รหัส WiFi">
          <button class="pw-eye" onclick="tgl('a-wpass',this)" tabindex="-1">👁</button>
        </div>
      </div>
    </div>

    <div class="sec-title" style="margin-top:8px;">🔥 Firebase</div>
    <div class="ig">
      <div class="label">Database URL *</div>
      <input class="field" id="a-dburl" placeholder="https://xxx-default-rtdb.asia-southeast1.firebasedatabase.app">
    </div>
    <div class="row2">
      <div class="ig">
        <div class="label">API Key *</div>
        <input class="field" id="a-apikey" placeholder="AIzaSy…">
      </div>
      <div class="ig">
        <div class="label">Project ID *</div>
        <input class="field" id="a-projid" placeholder="my-project-12345">
      </div>
    </div>
    <div class="row2">
      <div class="ig">
        <div class="label">App ID *</div>
        <input class="field" id="a-appid" placeholder="1:123:web:abc">
      </div>
      <div class="ig">
        <div class="label">Messaging Sender ID</div>
        <input class="field" id="a-msid" placeholder="123456789">
      </div>
    </div>
    <div class="row2">
      <div class="ig">
        <div class="label">Auth Email</div>
        <input class="field" type="email" id="a-email" placeholder="device@example.com">
      </div>
      <div class="ig">
        <div class="label">Auth Password</div>
        <div class="pw-wrap">
          <input class="field" type="password" id="a-fpass" placeholder="••••••••">
          <button class="pw-eye" onclick="tgl('a-fpass',this)" tabindex="-1">👁</button>
        </div>
      </div>
    </div>

    <button class="btn-reg" id="reg-btn" onclick="registerDevice()">ลงทะเบียนตู้นี้</button>
    <div class="msg" id="reg-msg"></div>
  </div>

  <!-- รายการตู้ที่ลงทะเบียนแล้ว -->
  <div class="list-section">
    <div class="sec-title">📋 ตู้ทั้งหมดในระบบ</div>
    <div id="dev-list"><div class="empty-list">กำลังโหลด…</div></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getAuth, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
import { getDatabase, ref, set, remove, onValue, get }
  from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyCnBjSbD4zZpc-t0QfK7i5PlfQfuSgdyRw",
  authDomain:"eggproject-cf0bc.firebaseapp.com",
  databaseURL:"https://eggproject-cf0bc-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"eggproject-cf0bc",
  storageBucket:"eggproject-cf0bc.firebasestorage.app",
  messagingSenderId:"630146139668",
  appId:"1:630146139668:web:58b60cbbeb16b6ad7c0901"
});
const auth = getAuth(app);
const db   = getDatabase(app);

onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'login.html'; return; }
  const snap = await get(ref(db, `users/${user.uid}/profile`));
  if (snap.val()?.role !== 'admin') { location.href = 'dashboard.html'; return; }
  document.getElementById('auth-guard').style.display = 'none';
  loadDeviceList();
});

function v(id) { return document.getElementById(id).value.trim(); }

function tgl(id, btn) {
  const f = document.getElementById(id);
  f.type = f.type === 'password' ? 'text' : 'password';
  btn.textContent = f.type === 'password' ? '👁' : '🔒';
}
window.tgl = tgl;

async function registerDevice() {
  const devId  = v('a-id').replace(/\s+/g,'_');
  const name   = v('a-name');
  const msg    = document.getElementById('reg-msg');
  const btn    = document.getElementById('reg-btn');

  if (!devId)        { showMsg('กรุณากรอก Device ID', false); return; }
  if (!name)         { showMsg('กรุณากรอกชื่อตู้', false); return; }
  if (!v('a-dburl')) { showMsg('กรุณากรอก Database URL', false); return; }
  if (!v('a-apikey')){ showMsg('กรุณากรอก API Key', false); return; }
  if (!v('a-projid')){ showMsg('กรุณากรอก Project ID', false); return; }
  if (!v('a-appid')) { showMsg('กรุณากรอก App ID', false); return; }

  btn.disabled = true; btn.textContent = 'กำลังลงทะเบียน…';
  try {
    await set(ref(db, `devices/${devId}`), {
      name,
      status:              'unclaimed',
      ownerUid:            null,
      wifiSSID:            v('a-ssid'),
      wifiPassword:        v('a-wpass'),
      firebaseDatabaseURL: v('a-dburl'),
      firebaseApiKey:      v('a-apikey'),
      firebaseProjectId:   v('a-projid'),
      firebaseAppId:       v('a-appid'),
      firebaseMsgId:       v('a-msid'),
      authEmail:           v('a-email'),
      authPassword:        v('a-fpass'),
      registeredAt:        Date.now(),
    });
    showMsg(`✅ ลงทะเบียนตู้ "${name}" (${devId}) แล้ว`, true);
    // clear form
    ['a-id','a-name','a-ssid','a-wpass','a-dburl','a-apikey','a-projid','a-appid','a-msid','a-email','a-fpass']
      .forEach(id => { document.getElementById(id).value = ''; });
  } catch(e) {
    showMsg('เกิดข้อผิดพลาด: ' + e.message, false);
  }
  btn.disabled = false; btn.textContent = 'ลงทะเบียนตู้นี้';
}
window.registerDevice = registerDevice;

function showMsg(text, ok) {
  const el = document.getElementById('reg-msg');
  el.textContent = text;
  el.className = 'msg ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
  if (ok) setTimeout(() => el.style.display = 'none', 4000);
}

function loadDeviceList() {
  onValue(ref(db, 'devices'), snap => {
    const list = document.getElementById('dev-list');
    if (!snap.exists()) {
      list.innerHTML = '<div class="empty-list">ยังไม่มีตู้ลงทะเบียน</div>';
      return;
    }
    list.innerHTML = '';
    Object.entries(snap.val()).forEach(([id, d]) => {
      const claimed = d.ownerUid && d.status === 'claimed';
      const row = document.createElement('div');
      row.className = 'dev-row';
      row.innerHTML = `
        <div class="dev-info">
          <div class="dev-name-row">${d.name || id}</div>
          <div class="dev-meta">${id} · ${d.wifiSSID || 'ไม่มี WiFi'}</div>
        </div>
        <span class="status-pill ${claimed ? 'claimed' : 'unclaimed'}">${claimed ? 'Claimed' : 'ว่าง'}</span>
        <button class="btn-del" onclick="delDevice('${id}')" title="ลบออกจากระบบ">✕</button>`;
      list.appendChild(row);
    });
  });
}

async function delDevice(devId) {
  if (!confirm(`ลบตู้ "${devId}" ออกจากระบบ?\n(ผู้ใช้ที่ claim ไปแล้วจะยังเห็นตู้นี้ใน dashboard)`)) return;
  await remove(ref(db, `devices/${devId}`));
}
window.delDevice = delDevice;
</script>
</body>
</html>
